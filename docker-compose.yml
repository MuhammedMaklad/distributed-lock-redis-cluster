version: '3.8'

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - "7000:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    ports:
      - "7001:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    ports:
      - "7002:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    ports:
      - "7003:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    ports:
      - "7004:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    ports:
      - "7005:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster

  # helper service to initialize the cluster
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    volumes:
      - ./init-cluster.sh:/init-cluster.sh
    entrypoint: ['/bin/sh','/init-cluster.sh']
    networks:
      - redis-cluster

  backend:
    build: .
    container_name: backend-service
    ports:
      - "3000:3000"
    environment:
      - IS_DOCKER=true
      - PORT=3000
    depends_on:
      - redis-cluster-init
    networks:
      - redis-cluster

networks:
  redis-cluster:
    driver: bridge